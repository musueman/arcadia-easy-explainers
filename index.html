<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arcadia 쉬운해설본</title>
  <style>
    :root {
      --bg: #f6f2e8;
      --paper: #fffdf7;
      --ink: #20242a;
      --muted: #65706a;
      --line: #d9d1bf;
      --soft: #ede5d6;
      --accent: #2f5f6f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", Arial, sans-serif;
      line-height: 1.75;
    }
    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      padding: 24px;
      border-right: 1px solid var(--line);
      background: #e9dfcf;
    }
    main { min-width: 0; padding: 28px; }
    .brand { margin: 0 0 8px; font-size: 25px; line-height: 1.25; }
    .caption { margin: 0 0 18px; color: var(--muted); font-size: 14px; }
    .doc-link {
      display: block;
      padding: 11px 12px;
      border: 1px solid #b9ad98;
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
    }
    .utility {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0;
    }
    button, .utility a {
      border: 1px solid #aab9b1;
      border-radius: 8px;
      padding: 8px 10px;
      background: #eef5f1;
      color: #183b42;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    .doc {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
    }
    article h1 { margin: 0 0 20px; font-size: 34px; line-height: 1.25; }
    article h2 {
      margin: 34px 0 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
      font-size: 24px;
      line-height: 1.35;
      cursor: pointer;
    }
    article h3 { margin: 26px 0 10px; font-size: 20px; }
    article p { margin: 11px 0; }
    article code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #eee8dd;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 0.92em;
    }
    table {
      width: 100%;
      margin: 14px 0 22px;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 8px 10px;
      border: 1px solid var(--line);
      vertical-align: top;
    }
    th { background: #efe8dc; text-align: left; }
    .section-body.collapsed { display: none; }
    .toc {
      margin: 18px 0 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }
    .toc a {
      display: block;
      padding: 4px 0;
      color: #244f5e;
      text-decoration: none;
      font-size: 14px;
    }
    .toc a:hover { text-decoration: underline; }
    .error {
      padding: 14px;
      border: 1px solid #d9aaa2;
      border-radius: 8px;
      color: #8c3b2f;
      background: #fff0ed;
    }
    @media (max-width: 860px) {
      .layout { display: block; }
      aside {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      main { padding: 14px; }
      .doc { padding: 18px; }
      article h1 { font-size: 27px; }
      article h2 { font-size: 20px; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1 class="brand">Arcadia 쉬운해설본</h1>
      <p class="caption">마스터 객관정보와 기준시대 5083 정보를 한 파일로 묶은 공개 해설본.</p>
      <a class="doc-link" href="./Arcadia_쉬운해설본_v1.md">Markdown 원문 열기</a>
      <div class="utility">
        <button id="expandAll" type="button">모두 펼치기</button>
        <button id="collapseAll" type="button">모두 접기</button>
      </div>
      <nav id="toc" class="toc"></nav>
    </aside>
    <main>
      <div class="doc">
        <article id="content">불러오는 중...</article>
      </div>
    </main>
  </div>
  <script>
    const file = './Arcadia_쉬운해설본_v1.md';
    const content = document.getElementById('content');
    const toc = document.getElementById('toc');

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function inline(text) {
      return escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function parseTable(lines, start) {
      const rows = [];
      let i = start;
      while (i < lines.length && /^\|.*\|$/.test(lines[i].trim())) {
        rows.push(lines[i].trim());
        i += 1;
      }
      if (rows.length < 2) return null;
      const htmlRows = rows
        .filter((row, index) => index !== 1)
        .map((row, index) => {
          const cells = row.slice(1, -1).split('|').map(cell => inline(cell.trim()));
          const tag = index === 0 ? 'th' : 'td';
          return '<tr>' + cells.map(cell => `<${tag}>${cell}</${tag}>`).join('') + '</tr>';
        })
        .join('');
      return { html: `<table>${htmlRows}</table>`, next: i };
    }

    function renderMarkdown(md) {
      const lines = md.replace(/\r\n/g, '\n').split('\n');
      const html = [];
      let paragraph = [];

      function flushParagraph() {
        if (paragraph.length) {
          html.push('<p>' + inline(paragraph.join(' ')) + '</p>');
          paragraph = [];
        }
      }

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        if (!line.trim()) {
          flushParagraph();
          continue;
        }
        const table = parseTable(lines, i);
        if (table) {
          flushParagraph();
          html.push(table.html);
          i = table.next - 1;
          continue;
        }
        const heading = /^(#{1,3})\s+(.+)$/.exec(line);
        if (heading) {
          flushParagraph();
          const level = heading[1].length;
          const text = heading[2].trim();
          const id = text.toLowerCase().replace(/[^a-z0-9가-힣]+/g, '-').replace(/^-|-$/g, '');
          html.push(`<h${level} id="${id}">${inline(text)}</h${level}>`);
          continue;
        }
        paragraph.push(line.trim());
      }
      flushParagraph();
      return html.join('\n');
    }

    function wrapSections() {
      const nodes = Array.from(content.childNodes);
      let currentBody = null;
      nodes.forEach(node => {
        if (node.nodeType === 1 && node.tagName === 'H2') {
          currentBody = document.createElement('div');
          currentBody.className = 'section-body';
          node.after(currentBody);
          node.addEventListener('click', () => currentBody.classList.toggle('collapsed'));
        } else if (currentBody && node.parentNode === content) {
          currentBody.appendChild(node);
        }
      });
    }

    function buildToc() {
      toc.innerHTML = '';
      content.querySelectorAll('h2').forEach(h => {
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        toc.appendChild(a);
      });
    }

    fetch(file)
      .then(response => {
        if (!response.ok) throw new Error('문서를 불러오지 못했습니다.');
        return response.text();
      })
      .then(md => {
        content.innerHTML = renderMarkdown(md);
        wrapSections();
        buildToc();
      })
      .catch(error => {
        content.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      });

    document.getElementById('expandAll').addEventListener('click', () => {
      document.querySelectorAll('.section-body').forEach(el => el.classList.remove('collapsed'));
    });
    document.getElementById('collapseAll').addEventListener('click', () => {
      document.querySelectorAll('.section-body').forEach(el => el.classList.add('collapsed'));
    });
  </script>
</body>
</html>
